version: '3.8'

services:
  backend:
    build: ./ai-consensus-backend
    ports:
      - "5000:5000"
    environment:
      # You can pass your OpenRouter key here, or let it read from the .env file in the backend folder
      - PORT=5000
    env_file:
      - ./ai-consensus-backend/.env

  frontend:
    build: ./ai-consensus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend